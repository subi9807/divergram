  <body class="is-loading">
    <div class="loader" aria-hidden="true"><div class="loader__inner"><div class="loader__orb"></div><div class="loader__text">Divergram loading</div></div></div>
    <div class="site"><div class="site__noise"></div><div class="site__grid"></div>
      <main id="content" style="min-height:100vh; display:grid; place-items:center; padding: 2rem;">
        <div class="container" style="text-align:center; max-width: 56rem;">
          <div class="eyebrow" style="margin-inline:auto;"><span class="eyebrow__dot"></span> Maintenance</div>
          <h1 data-split-text style="font-size: clamp(4rem, 14vw, 10rem); margin-top: 1rem;">점검중입니다</h1>
          <p class="page-hero__lead" style="margin-inline:auto;">더 나은 서비스 제공을 위해 잠시 점검을 진행하고 있습니다. 곧 다시 열리겠습니다.</p>
          <div class="card" data-reveal="up" style="margin-top: 3rem; padding: 1.5rem;">
            <div class="timeline__step" style="grid-template-columns: 1fr; margin:0;">
              <div class="timeline__num">●</div>
              <div class="timeline__copy"><h3>작업 중인 내용</h3><p>성능 개선, 보안 업데이트, UI 정비가 진행 중입니다.</p></div>
            </div>
          </div>
          <div style="display:flex; justify-content:center; gap:0.85rem; flex-wrap:wrap; margin-top: 2rem;">
            <a class="button button--primary" data-ripple href="/">홈으로 이동</a>
            <a class="button button--ghost" data-ripple href="./contact">문의하기</a>
          </div>
