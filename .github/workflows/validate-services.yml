name: Validate Divergram services

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [app, api, adm, web]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm for app
        if: matrix.service == 'app'
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate
      - name: Install app dependencies
        if: matrix.service == 'app'
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install service dependencies
        if: matrix.service != 'app'
        run: npm ci --ignore-scripts
      - name: Validate app
        if: matrix.service == 'app'
        run: pnpm run lint -- --no-cache && pnpm exec tsc --noEmit
      - name: Validate API syntax
        if: matrix.service == 'api'
        run: find server -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Build admin
        if: matrix.service == 'adm'
        run: npm run build
      - name: Validate web
        if: matrix.service == 'web'
        run: npm run lint && npm run typecheck && npm run build
