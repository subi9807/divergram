name: Validate Divergram services

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [app, api, adm, web]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci --ignore-scripts
      - name: Validate app
        if: matrix.service == 'app'
        run: npm run lint -- --no-cache && npx tsc --noEmit
      - name: Validate API syntax
        if: matrix.service == 'api'
        run: find server -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Build admin
        if: matrix.service == 'adm'
        run: npm run build
      - name: Validate web
        if: matrix.service == 'web'
        run: npm run lint && npm run typecheck && npm run build
