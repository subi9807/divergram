version: '3.9'
services:
  db:
    image: postgres:16
    container_name: divergram-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: divergram
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - divergram_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d divergram"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  divergram_pgdata:
